# Publicly credit Sauce Labs because they generously support open source
# projects.
name: Frontend Tests

on:
  workflow_call:

jobs:
  test-frontend:
    runs-on: ubuntu-latest

    steps:
      -
        name: Check out Etherpad core
        uses: actions/checkout@v6
        with:
          repository: ether/etherpad-lite
          path: etherpad-lite
      - uses: actions/setup-node@v4
        name: Install Node.js
        with:
          node-version: 22
      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: 10
          run_install: false
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      -
        name: Checkout plugin repository
        uses: actions/checkout@v6
        with:
          path: plugin
      -
        name: Install Etherpad core dependencies
        working-directory: ./etherpad-lite
        run: bin/installDeps.sh
      - name: Install peer dep ep_ai_core from registry
        working-directory: ./etherpad-lite
        run: pnpm run plugins i ep_ai_core
      # Intentionally NOT installing ep_comments_page here. The frontend
      # editing specs expect AI requests to apply edits directly to the
      # pad; with ep_comments_page present, the plugin's "auto" default
      # routes to suggest mode and the pad text would not change in
      # response to those tests.
      - name: Install plugin
        working-directory: ./etherpad-lite
        run: |
          pnpm run plugins i --path ../../plugin
      - name: Create settings.json with mocked LLM endpoint
        working-directory: ./etherpad-lite
        shell: bash
        run: |
          # Start from the standard test settings, then merge in an
          # ep_ai_core block pointing the AI plugin at our local mock LLM.
          # rateLimitMs is shrunk to 100 so tests that send back-to-back
          # @ai messages aren't dropped by the production 5s rate limit.
          jq '.ep_ai_core = {
                "apiBaseUrl": "http://127.0.0.1:18089",
                "apiKey": "test-key",
                "model": "test-model",
                "provider": "openai",
                "access": {"defaultMode": "full", "pads": {}},
                "chat": {
                  "trigger": "@ai",
                  "authorName": "AI Assistant",
                  "maxContextChars": 50000,
                  "chatHistoryLength": 20,
                  "conversationBufferSize": 10,
                  "rateLimitMs": 100
                }
              }' ./src/tests/settings.json > settings.json
      - name: Run the frontend tests
        working-directory: ./etherpad-lite
        shell: bash
        run: |
          # Start the mock LLM server (bundled with the plugin under test/)
          # in the background so the AI plugin has somewhere to call.
          MOCK_LLM_PORT=18089 node ../plugin/test/mock-llm-server.js &
          MOCK_LLM_PID=$!
          # Make sure it's actually accepting before launching Etherpad.
          for i in $(seq 1 15); do
            if curl -sSfo /dev/null -X POST \
                -H "Content-Type: application/json" \
                -d '{"messages":[{"role":"user","content":"ping"}]}' \
                http://127.0.0.1:18089/chat/completions; then
              break
            fi
            sleep 1
          done
          pnpm run dev &
          connected=false
          can_connect() {
            curl -sSfo /dev/null http://localhost:9001/ || return 1
            connected=true
          }
          now() { date +%s; }
          start=$(now)
          while [ $(($(now) - $start)) -le 30 ] && ! can_connect; do
            sleep 1
          done
          cd src
          pnpm exec playwright install chromium --with-deps
          pnpm run test-ui --project=chromium
          ec=$?
          # Best-effort cleanup; CI runner is going away anyway.
          kill "$MOCK_LLM_PID" 2>/dev/null || true
          exit $ec
