name: Backend Tests

# any branch is useful for testing before a PR is submitted
on:
  workflow_call:

jobs:
  withplugins:
    # Always run. The previous guard skipped this job for same-repo pull
    # requests (it only ran on pushes or fork PRs), but the parent workflow
    # only triggers `push` on main/master — so same-repo feature-branch PRs
    # got NO backend run at all, and failures only surfaced post-merge on
    # main where nothing blocks on them. A genuine padEditor regression sat
    # red on main for weeks as a result. Backend tests need no secrets, so
    # running them on every PR (incl. forks) is safe and is what actually
    # guards the branch before merge.
    name: with Plugins
    runs-on: ubuntu-latest
    # Least privilege: this job checks out and runs PR-controlled plugin code
    # (including from forks), so it must not inherit repo-default token write
    # scopes. It only needs to read the repo.
    permissions:
      contents: read
    steps:
      -
        name: Install libreoffice
        uses: awalsh128/cache-apt-pkgs-action@v1.6.1
        with:
          packages: libreoffice libreoffice-pdfimport
          version: 1.0
      -
        name: Install etherpad core
        uses: actions/checkout@v7
        with:
          repository: ether/etherpad-lite
          path: etherpad-lite
      - uses: actions/setup-node@v6
        name: Install Node.js
        with:
          node-version: 25
      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: 10
          run_install: false
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      -
        name: Checkout plugin repository
        uses: actions/checkout@v7
        with:
          path: plugin
      - name: Remove tests
        working-directory: ./etherpad-lite
        run: rm -rf ./src/tests/backend/specs
      -
        name: Install Etherpad core dependencies
        working-directory: ./etherpad-lite
        run: bin/installDeps.sh
      # Deliberately do NOT pre-install ep_ai_core here. It is a hard runtime
      # dependency declared in package.json "dependencies", so installing the
      # plugin alone must pull it in automatically. Pre-installing it would mask
      # a regression if it were ever moved back to peerDependencies (peer deps
      # are not auto-installed), which is exactly the bug that closed #33.
      - name: Install optional peer dep ep_comments_page from registry
        working-directory: ./etherpad-lite
        run: pnpm run plugins i ep_comments_page
      - name: Install plugin (must resolve ep_ai_core on its own)
        working-directory: ./etherpad-lite
        run: |
          pnpm run plugins i --path  ../../plugin
      -
        name: Run the backend tests
        working-directory: ./etherpad-lite/src
        run: |
          shopt -s globstar
          res=$(find ./plugin_packages -path "*/static/tests/backend/specs/*" 2>/dev/null | wc -l)
          if [ $res -eq 0 ]; then
          echo "No backend tests found"
          else
          npx cross-env NODE_ENV=production mocha --import=tsx --timeout 120000 --recursive node_modules/ep_*/static/tests/backend/specs/**
          fi
